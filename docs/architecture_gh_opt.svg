  <text x="580" y="785" text-anchor="middle" font-size="11" fill="#5f5e5a">tasks, deps, features</text>
  <line x1="400" y1="752" x2="400" y2="62" stroke="#b4b2a9" stroke-width="0.75" stroke-dasharray="4 3" marker-end="url(#arr)"/>

