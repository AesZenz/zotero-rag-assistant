  <text x="514" y="669" text-anchor="middle" font-size="10" fill="#712b13">test_chunker.py …</text>

  <rect x="598" y="642" width="148" height="36" rx="5" fill="#f0997b" stroke="#993c1d" stroke-width="0.75"/>
  <text x="672" y="655" text-anchor="middle" font-size="10" fill="#712b13">test_claude_</text>
  <text x="672" y="669" text-anchor="middle" font-size="10" fill="#712b13">generation.py</text>

  <!-- ════ INTER-LAYER ARROWS ════
       All routes use the 80px gap corridor x=350..430.
       Offsets within corridor to avoid line overlap:
         x=375  scripts → retrieval
         x=383  scripts → ingestion
         x=393  eval → generation (dashed reference)

       scripts → generation: straight up col B (gap y=470..490 is clear)
       run_evaluation → eval: straight horizontal y=608 (entirely in gap x=350..444)
  -->

  <!-- scripts → generation: 20px clear gap between gen bottom(470) and scripts top(490) -->
  <line x1="672" y1="490" x2="672" y2="472" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arr)"/>

  <!-- run_evaluation → eval: straight horizontal, clear gap between col B(x=444) and col A(x=350) -->
  <line x1="444" y1="608" x2="352" y2="608" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arr)"/>

  <!-- scripts → ingestion:
       Start at scripts left edge (430, 546) — midpoint of ingest_papers box
       Go left to corridor x=383 (inside gap, clear of both col boxes)
       Go up to y=82 (8px above ingestion top at y=90)
       Go right to x=195 (ingestion centre)
       Go down into ingestion top at y=90
  -->
  <path d="M430 546 L383 546 L383 82 L195 82 L195 90" fill="none" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arr)"/>

  <!-- scripts → retrieval:
       Start at scripts left edge (430, 640) — midpoint of run_evaluation box
       Go left to corridor x=375 (inside gap, different offset from ingestion line)
       Go up to y=273 (7px above retrieval top at y=280, below ingestion bottom at y=260)
       Go right to x=195 (retrieval centre)
       Go down into retrieval top at y=280
       KEY CHECK: x=375 corridor — left of scripts(430) ✓, left of generation(430) ✓,
                  right of retrieval(350) ✓, right of evaluation(350) ✓
                  y=273 segment runs from x=375 to x=195, fully in col A region, below
                  ingestion bottom (260) and above retrieval top (280) — 13px clear ✓
  -->
  <path d="M430 640 L375 640 L375 273 L195 273 L195 280" fill="none" stroke="#5f5e5a" stroke-width="1" marker-end="url(#arr)"/>

  <!-- eval → generation (dashed reference):
       Exit eval right edge at (350, 560)
       Go right to corridor x=393
       Go up to y=350 (midpoint of generation)
       Enter generation left at (430, 350)
  -->
  <path d="M350 560 L393 560 L393 350 L430 350" fill="none" stroke="#b4b2a9" stroke-width="0.75" stroke-dasharray="4 3" marker-end="url(#arr)"/>

